# ARIS Single-User GPU Deployment
# For deploying ARIS with full GPU access on a single machine.
#
# Usage:
#   1. Copy deploy/ dir to GPU server
#   2. Copy .env.gpu.example → .env, fill in values
#   3. docker compose -f docker-compose.gpu.yaml up -d
#   4. docker exec -it aris-gpu bash

services:
  aris:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.gpu
      args:
        USERNAME: ${USERNAME:-researcher}
        UID: ${USER_UID:-1000}
        GID: ${USER_GID:-1000}
        ARIS_BRANCH: ${ARIS_BRANCH:-orangmood-tripartite-night-20260512}
    container_name: aris-gpu
    hostname: aris-gpu
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - HTTP_PROXY=${HTTP_PROXY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
      - NO_PROXY=${NO_PROXY:-}
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-all}
      - CUDA_VISIBLE_DEVICES=${CUDA_VISIBLE_DEVICES:-}
    volumes:
      # Project directory (your exp0516 etc.)
      - ${PROJECT_PATH:-/workspace/Orangmood/ARIS}:/aris/projects
      # Datasets (optional, read-only)
      - ${DATASETS_PATH:-/dev/null}:/aris/shared/datasets:ro
      # Pretrained models cache
      - ${PRETRAINED_PATH:-pretrained-cache}:/aris/shared/pretrained
      # SSH keys from host
      - ${SSH_PATH:-~/.ssh}:/run/secrets/ssh:ro
      # Persist claude/codex config across rebuilds
      - claude-config:/home/${USERNAME:-researcher}/.claude
      - codex-config:/home/${USERNAME:-researcher}/.codex
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    stdin_open: true
    tty: true
    restart: unless-stopped
    # Keep container running
    command: ["bash"]

volumes:
  pretrained-cache:
  claude-config:
  codex-config:
