version: 1
description: "ARIS 开发者文档 DAG。边方向为：源材料 -> 需要同步更新的计划、日志、规范或索引。"

nodes:
  to-developer/DOC_DAG.yaml:
    title: "开发者文档 DAG 源数据"
    layer: governance
    kind: source
  to-developer/DOC_DAG.mmd:
    title: "开发者文档 DAG Mermaid 图"
    layer: generated
    kind: generated
  to-developer/DEVELOPMENT_LOG.md:
    title: "开发日志"
    layer: log
    kind: log
  to-developer/HANDOFF_CLAUDE_TO_CODEX.md:
    title: "Claude 到 Codex handoff"
    layer: handoff
    kind: handoff
  to-developer/handoff-2026-06-11.md:
    title: "历史 handoff"
    layer: handoff
    kind: handoff

  to-developer/plans/BRANCH_AND_PROMOTE_GUIDE.md:
    title: "分支和 Promote 指南"
    layer: promote
    kind: plan
  to-developer/plans/PROMOTE_FLOW.md:
    title: "Dev Promote 流程草案"
    layer: promote
    kind: plan
  to-developer/plans/VERSION_MANAGEMENT.md:
    title: "版本管理方案"
    layer: release
    kind: plan
  to-developer/plans/REPO_EVOLUTION_PLAN.md:
    title: "仓库演进计划"
    layer: architecture
    kind: plan
  to-developer/plans/AGENT_STATUS_STREAM.md:
    title: "Agent Status Stream 计划"
    layer: architecture
    kind: plan

  to-developer/deploy-QAs/clash_with_servers.md:
    title: "服务器代理 QA"
    layer: deploy
    kind: qa

  to-developer/discussions/*.md:
    title: "开发讨论记录"
    layer: discussion
    kind: glob
  to-developer/discussions/*.txt:
    title: "开发讨论文本"
    layer: discussion
    kind: glob
  to-developer/logs/*.md:
    title: "开发验证日志"
    layer: log
    kind: glob
  to-developer/logs/AGENT_STATUS_STREAM_VALIDATION_20260613.md:
    title: "Agent Status Stream 验证日志"
    layer: log
    kind: log
  to-developer/logs/SKILL_USABILITY_AUDIT_20260614.md:
    title: "Skill 可用性审计汇总"
    layer: log
    kind: log
  to-developer/logs/skill-usability-parts/*.md:
    title: "Skill 可用性审计分片"
    layer: log
    kind: glob

  AGENTS.md:
    title: "Dev Agent 指南"
    layer: governance
    kind: guide
  CONTEXT.md:
    title: "框架治理术语"
    layer: stable
    kind: glossary
  CHANGELOG.md:
    title: "用户可见变更"
    layer: stable
    kind: changelog
  docs/PROMOTE_FLOW.md:
    title: "Stable Promote 规范"
    layer: stable
    kind: stable_target
  docs/DOC_DAG.yaml:
    title: "Stable 文档 DAG"
    layer: stable
    kind: stable_target
  docs/TOOLS_INDEX.md:
    title: "Stable 工具索引"
    layer: stable
    kind: stable_target

edges:
  - from: to-developer/DOC_DAG.yaml
    to: to-developer/DOC_DAG.mmd
    type: generates
    reason: "开发者文档 DAG 源数据生成 Mermaid 图。"
  - from: to-developer/DOC_DAG.yaml
    to: to-developer/plans/REPO_EVOLUTION_PLAN.md
    type: informs
    reason: "仓库演进计划应知道 dev-only 文档结构。"

  - from: to-developer/plans/BRANCH_AND_PROMOTE_GUIDE.md
    to: to-developer/plans/PROMOTE_FLOW.md
    type: constrains
    reason: "Promote 流程依赖分支角色约定。"
  - from: to-developer/plans/VERSION_MANAGEMENT.md
    to: to-developer/plans/PROMOTE_FLOW.md
    type: constrains
    reason: "Promote 后是否 release/tag 受版本管理方案约束。"
  - from: to-developer/plans/PROMOTE_FLOW.md
    to: docs/PROMOTE_FLOW.md
    type: promotes_to
    reason: "成熟的 promote 规范应进入 stable docs。"
  - from: to-developer/plans/VERSION_MANAGEMENT.md
    to: CONTEXT.md
    type: promotes_to
    reason: "成熟的版本术语应进入 stable governance context。"
  - from: to-developer/plans/VERSION_MANAGEMENT.md
    to: docs/PROMOTE_FLOW.md
    type: constrains
    reason: "Stable promote 规范中的 release gate 来自版本管理方案。"

  - from: to-developer/plans/AGENT_STATUS_STREAM.md
    to: docs/DOC_DAG.yaml
    type: related_to
    reason: "Agent status 文档变化会影响 stable 文档 DAG 的 architecture/ADR 节点。"
  - from: to-developer/plans/AGENT_STATUS_STREAM.md
    to: to-developer/logs/AGENT_STATUS_STREAM_VALIDATION_20260613.md
    type: validated_by
    reason: "计划由本地验证日志支撑。"

  - from: to-developer/logs/*.md
    to: to-developer/DEVELOPMENT_LOG.md
    type: summarized_by
    reason: "开发验证日志需要蒸馏进模块级开发日志。"
  - from: to-developer/logs/skill-usability-parts/*.md
    to: to-developer/logs/SKILL_USABILITY_AUDIT_20260614.md
    type: summarized_by
    reason: "分片审计汇总为完整 skill 可用性审计。"
  - from: to-developer/DEVELOPMENT_LOG.md
    to: CHANGELOG.md
    type: distilled_to
    reason: "用户可见部分从开发日志蒸馏到 changelog。"

  - from: to-developer/discussions/*.md
    to: to-developer/DEVELOPMENT_LOG.md
    type: summarized_by
    reason: "重要讨论结论进入开发日志。"
  - from: to-developer/discussions/*.txt
    to: to-developer/DEVELOPMENT_LOG.md
    type: summarized_by
    reason: "历史讨论文本中的决策需要沉淀。"
  - from: to-developer/deploy-QAs/clash_with_servers.md
    to: docs/TOOLS_INDEX.md
    type: related_to
    reason: "代理/部署 QA 可能影响工具索引和运行说明。"

  - from: AGENTS.md
    to: to-developer/plans/PROMOTE_FLOW.md
    type: constrains
    reason: "开发 agent 的 promote 行为受 Dev Agent 指南约束。"
  - from: docs/DOC_DAG.yaml
    to: to-developer/DOC_DAG.yaml
    type: mirrors_boundary
    reason: "developer DAG 需要和 stable DAG 保持边界一致：stable 不包含 to-developer。"
