    "refine research plan", "细化研究方案", or wants a concrete research method that stays
    simple, focused, and top-venue ready instead of a vague or overbuilt idea.
  invokes:
  - auto-review-loop
  - experiment-plan
  - idea-creator
  - research-refine-pipeline
  - run-experiment
- name: research-refine-pipeline
  caller: leader
  description: Run an end-to-end workflow that chains `research-refine` and `experiment-plan`.
    Use when the user wants a one-shot pipeline from vague research direction to focused
    final proposal plus detailed experiment roadmap, or asks to "串起来", build a pipeline,
    do it end-to-end, or generate both the method and experiment plan together.
  invokes:
  - experiment-plan
  - research-refine
  - run-experiment
- name: research-review
  caller: reviewer
  description: Get a deep critical review of research from GPT via Codex MCP. Use
    when user says "review my research", "help me review", "get external review",
    or wants critical feedback on research ideas, papers, or experimental results.
- name: research-wiki
  caller: any
  description: Persistent research knowledge base that accumulates papers, ideas,
    experiments, claims, and their relationships across the entire research lifecycle.
    Inspired by Karpathy's LLM Wiki pattern. Use when user says "知识库", "research wiki",
    "add paper", "wiki query", "查知识库", or wants to build/query a persistent field
    map.
  invokes:
  - idea-creator
- name: resubmit-pipeline
  caller: leader
  description: 'Workflow 5: orchestrate a text-only resubmit of a polished paper to
    a different venue under hard constraints (no new experiments, no bib edits, no
    framework changes, never overwrite prior submissions). Phase 0 physical isolation,
    Phase 0.5 health + anonymity check, Phase 1 audit (proof / claim / citation),
    Phase 2 microedits via auto-loop with edit-whitelist + citation-audit --soft-only,
    Phase 3 kill-argument adversarial gate, Phase 4 final compile + Overleaf push
    via /overleaf-sync. Use when user says "resubmit pipeline", "重投流程", "port paper
    to <new venue>", "resubmit to <venue>", "tighten paper for resubmission", or has
    a rejected/withdrawn paper to move to a different top venue under tight time budget.'
  invokes:
  - auto-paper-improvement-loop
  - overleaf-sync
  - paper-claim-audit
  - paper-compile
  - proof-checker
- name: result-to-claim
  caller: leader
  description: Use when experiments complete to judge what claims the results support,
    what they don't, and what evidence is still missing. Codex MCP evaluates results
    against intended claims and routes to next action (pivot, supplement, or confirm).
    Use after experiments finish — before writing the paper or running ablations.
  invokes:
  - idea-creator
- name: review
  caller: reviewer
  description: Review the changes since a fixed point (commit, branch, tag, or merge-base)
    along two axes — Standards (does the code follow this repo's documented coding
    standards?) and Spec (does the code match what the originating issue/PRD asked
    for?). Runs both reviews in parallel sub-agents and reports them side by side.
    Use when the user wants to review a branch, a PR, work-in-progress changes, or
    asks to "review since X".
- name: run-experiment
  caller: executor
  description: Deploy and run ML experiments on local, remote, Vast.ai, or Modal serverless
    GPU. Use when user says "run experiment", "deploy to server", "跑实验", or needs
    to launch training jobs.
- name: semantic-scholar
  caller: any
  description: Search published venue papers (IEEE, ACM, Springer, etc.) via Semantic
    Scholar API. Complements /arxiv (preprints) with citation counts, venue metadata,
    and TLDR. Use when user says "search semantic scholar", "find IEEE papers", "find
    journal papers", "venue papers", "citation search", or wants published literature
    beyond arXiv preprints.
  invokes:
  - arxiv
  - novelty-check
  - research-lit
- name: serverless-modal
  caller: executor
  description: 'Run GPU workloads on Modal — training, fine-tuning, inference, batch
    processing. Zero-config serverless: no SSH, no Docker, auto scale-to-zero. Use
    when user says "modal run", "modal training", "modal inference", "deploy to modal",
    "need a GPU", "run on modal", "serverless GPU", or needs remote GPU compute.'
  invokes:
  - run-experiment
- name: skill-dag-check
  caller: any
  description: Analyze skill dependency impact before modification. Shows upstream
    dependencies, downstream dependents, and artifact flow. Use when planning to modify,
    rename, or remove a skill, or when investigating skill relationships.
- name: slides-polish
  caller: executor
  description: 'Per-page Codex review + targeted python-pptx / Beamer fixes for academic
    talk slides. Use AFTER /paper-slides (or any externally generated PPTX/Beamer)
    when the deck looks ''mostly OK'' but the user wants a final pass that aligns
    visual weight with a reference, bumps PPTX fonts to projector-readable size, kills
    italic style leaks, fixes text-frame overflow, and catches per-slide layout drift.
    Trigger phrases: "polish slides", "slides 排版不对", "PPTX 字体太小", "和 Beamer 比一下",
    "per-page review", "和 codex 一页一页过".'
- name: specification-writing
  caller: executor
  description: Write the full patent specification from claims and invention disclosure.
    Use when user says "撰写说明书", "write specification", "写说明书", "patent description",
    or wants to draft the complete patent specification.
  invokes:
  - embodiment-description
  - figure-description
- name: sync
  caller: executor
  description: 一键同步科研项目：封装 git add/commit/push/pull + 远程部署。用户不需要懂 git。
  invokes:
  - init-research
- name: system-profile
  caller: executor
  description: Profile a target (script, process, GPU, memory, interconnect) using
    external tools and code instrumentation. Produces structured performance reports
    with actionable recommendations. Use when user says "profile", "benchmark", "bottleneck",
    or wants performance analysis.
- name: tdd
  caller: executor
  description: Test-driven development with red-green-refactor loop. Use when user
    wants to build features or fix bugs using TDD, mentions "red-green-refactor",
    wants integration tests, or asks for test-first development.
- name: to-issues
  caller: any
  description: Break a plan, spec, or PRD into independently-grabbable issues on the
    project issue tracker using tracer-bullet vertical slices. Use when user wants
    to convert a plan into issues, create implementation tickets, or break down work
    into issues.
- name: to-prd
  caller: any
  description: Turn the current conversation context into a PRD and publish it to
    the project issue tracker. Use when user wants to create a PRD from the current
    context.
- name: training-check
  caller: executor
  description: Periodically check WandB metrics during training to catch problems
    early (NaN, loss divergence, idle GPUs). Avoids wasting GPU hours on broken runs.
    Use when training is running and you want automated health checks.
- name: vast-gpu
  caller: executor
  description: Rent, manage, and destroy GPU instances on vast.ai. Use when user says
    "rent gpu", "vast.ai", "rent a server", "cloud gpu", or needs on-demand GPU without
    owning hardware.
  invokes:
  - run-experiment
- name: write-a-skill
  caller: any
  description: Create new agent skills with proper structure, progressive disclosure,
    and bundled resources. Use when user wants to create, write, or build a new skill.
- name: writer
  caller: executor
  description: 论文写作角色 - 只写论文、文档、Rebuttal，不写代码、不做部署
- name: writing-systems-papers
  caller: executor
  description: Paragraph-level structural blueprint for 10-12 page systems papers
    targeting OSDI, SOSP, ASPLOS, NSDI, and EuroSys. Provides page allocation, paragraph
    templates, and writing patterns. Use when user says "写系统论文", "systems paper structure",
    "OSDI paper", "SOSP paper", or wants fine-grained structural guidance for a systems
    conference submission.
