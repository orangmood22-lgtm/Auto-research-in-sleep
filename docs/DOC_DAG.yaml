edges:
  - from: docs/DOC_DAG.yaml
    to: docs/DOC_DAG.mmd
    type: generates
    reason: "DAG 源数据生成 Mermaid 图。"
  - from: docs/DOC_DAG.yaml
    to: docs/DOC_DEPENDENCIES.md
    type: governs
    reason: "依赖说明应引用机器可读 DAG。"
  - from: docs/DOC_DAG.yaml
    to: docs/README.md
    type: indexed_by
    reason: "文档索引需要列出 DAG 文档。"

  - from: docs/FRAMEWORK_STRUCTURE.md
    to: README.md
    type: summarized_by
    reason: "README 复述 framework/project/dev 边界。"
  - from: docs/FRAMEWORK_STRUCTURE.md
    to: docs/README.md
    type: indexed_by
    reason: "文档索引列出核心结构文档。"
  - from: docs/PROMOTE_FLOW.md
    to: AGENTS.md
    type: instructs
    reason: "Agent promote 规则引用 promote 规范。"
  - from: docs/PROMOTE_FLOW.md
    to: README.md
    type: indexed_by
    reason: "README 提供 promote 入口。"
  - from: docs/PROMOTE_FLOW.md
    to: docs/README.md
    type: indexed_by
    reason: "文档索引提供 promote 入口。"
  - from: docs/TOOLS_INDEX.md
    to: README.md
    type: indexed_by
    reason: "README 工具表应链接全量工具索引。"
  - from: docs/TOOLS_INDEX.md
    to: docs/README.md
    type: indexed_by
    reason: "文档索引应列出工具索引。"

  - from: CONTEXT.md
    to: AGENTS.md
    type: instructs
    reason: "Agent 指南把 CONTEXT 作为治理术语入口。"
  - from: CONTEXT.md
    to: docs/PROMOTE_FLOW.md
    type: constrains
    reason: "Promote 规范继承 stable/dev/release 术语。"
  - from: CHANGELOG.md
    to: docs/PROMOTE_FLOW.md
    type: constrains
    reason: "Promote 准入要求用户可见变更进入 changelog。"

  - from: QUICK_START.md
    to: README.md
    type: indexed_by
    reason: "README 提供快速开始入口。"
  - from: docs/OPERATIONS_GUIDE.md
    to: README.md
    type: summarized_by
    reason: "README 概述日常操作入口。"
  - from: docs/OPERATIONS_GUIDE.md
    to: QUICK_START.md
    type: referenced_by
    reason: "快速开始链接完整操作手册。"
  - from: docs/TRIPARTITE_ARCHITECTURE_GUIDE.md
    to: README.md
    type: summarized_by
    reason: "README 复述三边架构。"
  - from: docs/TRIPARTITE_ARCHITECTURE_GUIDE.md
    to: QUICK_START.md
    type: referenced_by
    reason: "快速开始引用三边架构。"
  - from: docs/LANGGRAPH_EVALUATION.md
    to: docs/README.md
    type: indexed_by
    reason: "文档索引列出 LangGraph 评估。"
  - from: deploy/DEPLOY_GUIDE.md
    to: README.md
    type: indexed_by
    reason: "README 提供部署入口。"
  - from: deploy/DEPLOY_GUIDE.md
    to: QUICK_START.md
    type: referenced_by
    reason: "快速开始 Docker/部署段依赖部署指南。"

  - from: docs/FEISHU_INTEGRATION.md
    to: README.md
    type: indexed_by
    reason: "README 列出飞书集成。"
  - from: docs/FEISHU_INTEGRATION.md
    to: docs/README.md
    type: indexed_by
    reason: "文档索引列出飞书集成。"
  - from: docs/FEISHU_INTEGRATION.md
    to: mcp-servers/README.md
    type: summarized_by
    reason: "MCP 索引复述 Feishu bridge 端点和启动方式。"
  - from: docs/adr/0003-feishu-control-uses-opt-in-codex-sessions.md
    to: docs/FEISHU_INTEGRATION.md
    type: referenced_by
    reason: "飞书集成说明引用控制边界 ADR。"
  - from: docs/adr/0004-feishu-control-lease-prioritizes-remote-input.md
    to: docs/FEISHU_INTEGRATION.md
    type: referenced_by
    reason: "飞书集成说明引用控制租约 ADR。"

  - from: docs/PROJECT_FILES_GUIDE.md
    to: docs/PROJECT_FILES_GUIDE_CN.md
    type: translated_by
    reason: "中文版本应与英文概念同步。"
  - from: docs/SESSION_RECOVERY_GUIDE.md
    to: docs/SESSION_RECOVERY_GUIDE_CN.md
    type: translated_by
    reason: "中文版本应与英文恢复协议同步。"
  - from: docs/NARRATIVE_REPORT_EXAMPLE.md
    to: docs/README.md
    type: indexed_by
    reason: "文档索引列出论文叙事报告示例。"
  - from: docs/WATCHDOG_GUIDE.md
    to: docs/WATCHDOG_GUIDE_CN.md
    type: translated_by
    reason: "中文版本应与英文 watchdog 指南同步。"
  - from: docs/CODEX_CLAUDE_REVIEW_GUIDE.md
    to: docs/CODEX_CLAUDE_REVIEW_GUIDE_CN.md
    type: translated_by
    reason: "中文版本应与英文 reviewer 指南同步。"
  - from: docs/CODEX_GEMINI_REVIEW_GUIDE.md
    to: docs/CODEX_GEMINI_REVIEW_GUIDE_CN.md
    type: translated_by
    reason: "中文版本应与英文 reviewer 指南同步。"
  - from: docs/ANTIGRAVITY_ADAPTATION.md
    to: docs/ANTIGRAVITY_ADAPTATION_CN.md
    type: translated_by
    reason: "中文版本应与英文 client 适配同步。"
  - from: docs/TRAE_ARIS_RUNBOOK_EN.md
    to: docs/TRAE_ARIS_RUNBOOK_CN.md
    type: translated_by
    reason: "中英文 Trae runbook 应同步。"

  - from: skills/*/SKILL.md
    to: docs/SKILL_CATALOG.md
    type: generated_by
    reason: "英文 skill catalog 由 skill frontmatter 生成。"
  - from: docs/SKILL_CATALOG.md
    to: docs/SKILL_CATALOG_CN.md
    type: translated_by
    reason: "中文 skill catalog 由英文 catalog 和翻译映射生成。"
  - from: skills/*/SKILL.md
    to: docs/SKILL_DAG.yaml
    type: generated_by
    reason: "Skill DAG 源数据由 skill frontmatter 生成。"
  - from: docs/SKILL_DAG.yaml
    to: docs/SKILL_DAG.mmd
    type: generated_by
    reason: "Mermaid skill DAG 由 YAML 生成。"
  - from: docs/SKILL_DAG.yaml
    to: docs/skill-dag.html
