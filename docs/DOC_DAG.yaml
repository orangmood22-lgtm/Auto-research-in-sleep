    reason: "交互式 skill DAG 由 YAML/生成器生成。"
  - from: docs/SKILL_CATALOG.md
    to: README.md
    type: summarized_by
    reason: "README skill 快览依赖 catalog。"
  - from: docs/SKILL_CATALOG_CN.md
    to: docs/README.md
    type: indexed_by
    reason: "文档索引列出中文 skill catalog。"

  - from: tools/*
    to: docs/TOOLS_INDEX.md
    type: indexed_by
    reason: "新增/删除工具时更新工具索引。"
  - from: tools/*
    to: README.md
    type: summarized_by
    reason: "README 工具表概述核心工具。"
  - from: tools/*
    to: docs/PROMOTE_FLOW.md
    type: referenced_by
    reason: "发布、安装、更新相关工具影响 promote 规范。"

  - from: templates/project.yaml.tmpl
    to: docs/PROJECT_FILES_GUIDE.md
    type: constrains
    reason: "项目文件指南描述 project.yaml。"
  - from: templates/project.yaml.tmpl
    to: QUICK_START.md
    type: summarized_by
    reason: "快速开始包含项目配置示例。"
  - from: templates/project.yaml.tmpl
    to: docs/OPERATIONS_GUIDE.md
    type: referenced_by
    reason: "操作手册解释项目配置。"
  - from: templates/AGENTS_MD_TEMPLATE.md
    to: AGENTS.md
    type: related_to
    reason: "项目 agent 模板和框架 agent 规则应保持概念一致。"
  - from: templates/CLAUDE_MD_TEMPLATE.md
    to: AGENTS.md
    type: related_to
    reason: "Claude 项目模板和框架 agent 规则应保持概念一致。"

  - from: docs/adr/0001-model-tiering-strategy.md
    to: docs/LLM_API_MIX_MATCH_GUIDE.md
    type: constrains
    reason: "Provider 混用策略受模型分层 ADR 约束。"
  - from: docs/MiniMax-GLM-Configuration.md
